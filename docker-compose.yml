services:
  db:
    image: postgres:16
    container_name: lead_system_db
    environment:
      POSTGRES_DB: leads
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leads"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: lead_system_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data

  core:
    build: .
    container_name: lead_system_core
    command: uvicorn core.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      SERVICE_NAME: core
      OTEL_TRACES_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
      OTEL_METRICS_EXPORTER: "none"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  landings:
    build: .
    container_name: lead_system_landings
    command: uvicorn landings.main:app --host 0.0.0.0 --port 8001
    env_file: .env
    environment:
      SERVICE_NAME: landings
      OTEL_TRACES_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
      OTEL_METRICS_EXPORTER: "none"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"

  worker:
    build: .
    container_name: lead_system_worker
    command: python -m core.worker
    env_file: .env
    environment:
      SERVICE_NAME: worker
      OTEL_TRACES_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
      OTEL_METRICS_EXPORTER: "none"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
